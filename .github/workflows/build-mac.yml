name: Build macOS Application

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Create virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build .app bundle with PyInstaller
      run: |
        source venv/bin/activate
        python -m PyInstaller \
          --onedir \
          --name "ATEM Media Generator" \
          --hidden-import=PyQt5.QtWidgets \
          --hidden-import=PyQt5.QtCore \
          --hidden-import=PyQt5.QtGui \
          --hidden-import=PyQt5.QtPrintSupport \
          --hidden-import=PyQt5.QtSvg \
          --hidden-import=PIL \
          --hidden-import=PIL.ImageTk \
          --collect-data=PIL \
          --windowed \
          --osx-bundle-identifier="com.atem.media-generator" \
          main.py

    - name: Create .zip archive
      run: |
        cd dist
        ditto -c -k --sequesterRsrc "ATEM Media Generator.app" "ATEM-Media-Generator-mac.zip"
        cd ..
        ls -lh dist/ATEM-Media-Generator-mac.zip

    - name: Upload to Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/ATEM-Media-Generator-mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ATEM-Media-Generator-mac
        path: dist/ATEM Media Generator.app/
