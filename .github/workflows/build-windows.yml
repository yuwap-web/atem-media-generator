name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Create virtual environment
      run: |
        python -m venv venv

    - name: Activate venv and install dependencies
      run: |
        .\venv\Scripts\Activate.ps1
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        .\venv\Scripts\Activate.ps1
        python -m PyInstaller `
          --onedir `
          --name "ATEM-Media-Generator" `
          --hidden-import=PyQt5.QtWidgets `
          --hidden-import=PyQt5.QtCore `
          --hidden-import=PyQt5.QtGui `
          --hidden-import=PyQt5.QtPrintSupport `
          --hidden-import=PyQt5.QtSvg `
          --hidden-import=PIL `
          --hidden-import=PIL.ImageTk `
          --collect-data=PIL `
          --windowed `
          main.py

    - name: Create portable .zip archive
      run: |
        powershell -Command "Compress-Archive -Path 'dist\ATEM-Media-Generator' -DestinationPath 'ATEM-Media-Generator-windows.zip'"
        dir /s ATEM-Media-Generator-windows.zip

    - name: Upload to Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ATEM-Media-Generator-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ATEM-Media-Generator-windows
        path: dist/ATEM-Media-Generator/
